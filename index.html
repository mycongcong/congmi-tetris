<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>聪米方块 优化版</title>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --glass: rgba(255,255,255,.12);
      --glass-strong: rgba(255,255,255,.2);
      --line: rgba(255,255,255,.25);
      --text: #fff;
      --pink: #ff5e8a;
      --purple: #7c5cff;
      --blue: #3b82f6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #101027;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      overscroll-behavior: none;
    }

    body {
      position: fixed;
      inset: 0;
      touch-action: none;
    }

    #bgCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100vw;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: max(8px, var(--safe-top)) 8px max(8px, var(--safe-bottom));
    }

    .game-stage {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .board-shell {
      position: relative;
      flex: 0 0 auto;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 24px rgba(255,255,255,.18), 0 12px 32px rgba(0,0,0,.55);
      background: rgba(0,0,0,.25);
    }

    #gameCanvas, #fxCanvas {
      display: block;
      border-radius: 14px;
    }

    #gameCanvas {
      border: 4px solid rgba(255,255,255,.92);
      background: #17172e;
    }

    #fxCanvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .side-controls {
      flex: 0 0 auto;
      width: 78px;
      max-width: 22vw;
      height: min(560px, calc(100dvh - 16px - var(--safe-top) - var(--safe-bottom)));
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      padding: 8px 6px;
      border-radius: 18px;
      background: rgba(0,0,0,.22);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.13);
    }

    .tool-row {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 2px;
    }

    .tool-btn, .ctrl-btn {
      border: 0;
      color: white;
      font-weight: 800;
      cursor: pointer;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      outline: none;
    }

    .tool-btn {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      font-size: 15px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.18);
    }

    .ctrl-btn {
      width: 62px;
      height: 52px;
      border-radius: 16px;
      font-size: 25px;
      background: linear-gradient(145deg, rgba(255,255,255,.28), rgba(255,255,255,.10));
      border: 2px solid rgba(255,255,255,.28);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.25), 0 8px 18px rgba(0,0,0,.22);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      line-height: 1;
    }

    .ctrl-btn small {
      margin-top: 3px;
      font-size: 10px;
      font-weight: 700;
      opacity: .88;
    }

    .ctrl-btn.rotate {
      height: 58px;
      background: linear-gradient(145deg, rgba(124,92,255,.72), rgba(255,255,255,.12));
    }

    .ctrl-btn.drop {
      background: linear-gradient(145deg, rgba(255,94,138,.8), rgba(255,255,255,.12));
    }

    .ctrl-btn.soft {
      background: linear-gradient(145deg, rgba(59,130,246,.7), rgba(255,255,255,.12));
    }

    .ctrl-btn:active, .ctrl-btn.pressed, .tool-btn:active, .tool-btn.pressed {
      transform: scale(.92);
      filter: brightness(1.25);
    }

    .mini-score {
      display: none;
      position: absolute;
      top: 8px;
      left: 8px;
      z-index: 5;
      background: rgba(0,0,0,.42);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 800;
      backdrop-filter: blur(8px);
    }

    .desktop-panel {
      display: none;
      width: 178px;
      flex: 0 0 auto;
      border-radius: 18px;
      padding: 14px;
      background: rgba(255,255,255,.13);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(12px);
    }

    .desktop-card {
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 14px;
      text-align: center;
      padding: 11px 8px;
      margin-bottom: 10px;
    }

    .desktop-card b {
      display: block;
      font-size: 13px;
      opacity: .75;
      margin-bottom: 3px;
    }

    .desktop-card span {
      font-size: 24px;
      font-weight: 900;
    }

    #nextCanvas {
      width: 120px;
      height: 90px;
      border-radius: 10px;
      background: rgba(0,0,0,.35);
    }

    .desktop-hint {
      font-size: 12px;
      line-height: 1.7;
      opacity: .85;
      margin-top: 6px;
    }

    .overlay-in-board {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      padding: 18px;
      background: rgba(0,0,0,.72);
      text-align: center;
    }

    .overlay-title {
      font-size: 28px;
      font-weight: 900;
      text-shadow: 0 3px 10px rgba(0,0,0,.5);
    }

    .overlay-sub {
      font-size: 16px;
      opacity: .9;
    }

    .primary-btn, .secondary-btn {
      width: min(220px, 80%);
      min-height: 44px;
      border-radius: 14px;
      border: 0;
      color: white;
      font-weight: 900;
      font-size: 15px;
      cursor: pointer;
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--pink), var(--purple));
    }

    .secondary-btn {
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.2);
    }

    .menu-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(5,5,18,.82);
      backdrop-filter: blur(8px);
    }

    .menu-box {
      width: min(360px, 92vw);
      border-radius: 26px;
      padding: 28px 22px;
      background: linear-gradient(135deg, rgba(102,126,234,.96), rgba(118,75,162,.96));
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
      text-align: center;
      border: 1px solid rgba(255,255,255,.18);
    }

    .logo {
      font-size: 36px;
      font-weight: 900;
      margin-bottom: 20px;
      letter-spacing: 1px;
      text-shadow: 0 4px 14px rgba(0,0,0,.35);
    }

    .menu-box p {
      font-size: 14px;
      opacity: .9;
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .menu-button {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 16px;
      margin: 7px 0;
      color: white;
      font-size: 16px;
      font-weight: 900;
      background: linear-gradient(135deg, #f093fb, #f5576c);
      cursor: pointer;
    }

    .menu-button.secondary {
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.18);
    }

    .hidden { display: none !important; }

    .toast {
      position: fixed;
      left: 50%;
      top: 48%;
      transform: translate(-50%, -50%);
      z-index: 60;
      font-size: 30px;
      font-weight: 900;
      color: #ffd700;
      text-shadow: 0 4px 18px rgba(0,0,0,.55);
      pointer-events: none;
      animation: pop 1s ease forwards;
      white-space: nowrap;
    }

    @keyframes pop {
      0% { opacity: 0; transform: translate(-50%, -45%) scale(.85); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
      100% { opacity: 0; transform: translate(-50%, -70%) scale(1.35); }
    }

    @media (min-width: 780px) {
      .app { padding: 20px; }
      .game-stage { width: auto; height: auto; padding: 20px; border-radius: 24px; background: rgba(255,255,255,.12); backdrop-filter: blur(12px); box-shadow: 0 12px 42px rgba(0,0,0,.38); }
      .side-controls { display: none; }
      .desktop-panel { display: block; }
      .mini-score { display: block; }
    }

    @media (max-width: 360px) {
      .side-controls { width: 70px; gap: 7px; padding: 7px 4px; }
      .ctrl-btn { width: 56px; height: 48px; border-radius: 14px; font-size: 22px; }
      .ctrl-btn.rotate { height: 54px; }
      .tool-btn { width: 28px; height: 28px; }
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas"></canvas>

  <main class="app">
    <section class="game-stage" id="gameStage">
      <div class="board-shell" id="boardShell">
        <canvas id="gameCanvas"></canvas>
        <canvas id="fxCanvas"></canvas>
        <div class="mini-score" id="miniScore">0</div>

        <div class="overlay-in-board" id="pauseOverlay">
          <div class="overlay-title">⏸ 暂停</div>
          <button class="primary-btn" id="resumeBtn">继续游戏</button>
          <button class="secondary-btn" id="quitBtn">返回菜单</button>
        </div>

        <div class="overlay-in-board" id="gameOverOverlay">
          <div class="overlay-title">游戏结束</div>
          <div class="overlay-sub" id="finalScore">得分 0</div>
          <button class="primary-btn" id="restartBtn">再来一局</button>
          <button class="secondary-btn" id="homeBtn">返回菜单</button>
        </div>
      </div>

      <aside class="side-controls" id="sideControls" aria-label="手机操作按钮">
        <div class="tool-row">
          <button class="tool-btn" id="pauseBtn" aria-label="暂停">⏸</button>
          <button class="tool-btn" id="menuBtn" aria-label="菜单">⌂</button>
        </div>
        <button class="ctrl-btn rotate" id="rotateBtn" aria-label="旋转">↻</button>
        <button class="ctrl-btn" id="leftBtn" aria-label="左移">←</button>
        <button class="ctrl-btn" id="rightBtn" aria-label="右移">→</button>
        <button class="ctrl-btn soft" id="downBtn" aria-label="软降">↓<small>软降</small></button>
        <button class="ctrl-btn drop" id="dropBtn" aria-label="硬落">⬇<small>硬落</small></button>
      </aside>

      <aside class="desktop-panel" id="desktopPanel">
        <div class="desktop-card"><b>得分</b><span id="scoreDisplay">0</span></div>
        <div class="desktop-card"><b>等级</b><span id="levelDisplay">1</span></div>
        <div class="desktop-card"><b>消行</b><span id="linesDisplay">0</span></div>
        <div class="desktop-card"><b>下一个</b><canvas id="nextCanvas" width="120" height="90"></canvas></div>
        <button class="primary-btn" id="desktopPauseBtn" style="width:100%;margin-bottom:8px;">暂停</button>
        <button class="secondary-btn" id="desktopMenuBtn" style="width:100%;">菜单</button>
        <div class="desktop-hint">键盘：← → 移动，↑ 旋转，↓ 加速，空格硬落，P 暂停。</div>
      </aside>
    </section>
  </main>

  <div class="menu-overlay" id="mainMenu">
    <div class="menu-box">
      <div class="logo">聪米方块</div>
      <p>手机版已重新排版：棋盘最大化，右侧小按钮触控操作。</p>
      <button class="menu-button" id="startBtn">开始游戏</button>
      <button class="menu-button secondary" id="howBtn">操作说明</button>
    </div>
  </div>

  <div class="menu-overlay hidden" id="howMenu">
    <div class="menu-box">
      <div class="logo" style="font-size:28px;">操作说明</div>
      <p>手机：点右侧按钮控制。↻ 旋转，← → 左右移动，↓ 软降，⬇ 硬落。</p>
      <p>电脑：方向键移动/旋转，空格硬落，P 暂停。</p>
      <button class="menu-button" id="backHowBtn">返回</button>
    </div>
  </div>

  <script>
    const COLS = 10;
    const ROWS = 20;
    const SHAPES = {
      I: [[1,1,1,1]],
      O: [[1,1],[1,1]],
      T: [[0,1,0],[1,1,1]],
      S: [[0,1,1],[1,1,0]],
      Z: [[1,1,0],[0,1,1]],
      J: [[1,0,0],[1,1,1]],
      L: [[0,0,1],[1,1,1]]
    };
    const COLORS = {
      I:'#00e5ff', O:'#ffd700', T:'#a855f7', S:'#22c55e',
      Z:'#ef4444', J:'#3b82f6', L:'#f97316'
    };

    let blockSize = 28;
    let canvas, ctx, fxCanvas, fxCtx, bgCanvas, bgCtx, nextCanvas, nextCtx;
    let board = [];
    let currentPiece = null;
    let nextPiece = null;
    let score = 0;
    let level = 1;
    let lines = 0;
    let dropInterval = 920;
    let dropCounter = 0;
    let lastTime = 0;
    let rafId = null;
    let running = false;
    let paused = false;
    let gameOver = false;
    let particles = [];
    let bgDots = [];
    let audioCtx = null;

    const $ = id => document.getElementById(id);

    function init() {
      canvas = $('gameCanvas');
      ctx = canvas.getContext('2d');
      fxCanvas = $('fxCanvas');
      fxCtx = fxCanvas.getContext('2d');
      bgCanvas = $('bgCanvas');
      bgCtx = bgCanvas.getContext('2d');
      nextCanvas = $('nextCanvas');
      nextCtx = nextCanvas.getContext('2d');

      resizeAll();
      initBgDots();
      animateBg();
      bindUI();
      bindKeyboard();
      bindControls();
      drawEmptyBoard();

      window.addEventListener('resize', () => {
        resizeAll();
        draw();
        drawNext();
      });
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
          resizeAll();
          draw();
          drawNext();
        });
      }
    }

    function getViewport() {
      return {
        w: window.visualViewport?.width || window.innerWidth,
        h: window.visualViewport?.height || window.innerHeight
      };
    }

    function isMobile() {
      const v = getViewport();
      return v.w < 780;
    }

    function resizeAll() {
      const v = getViewport();
      bgCanvas.width = Math.round(v.w);
      bgCanvas.height = Math.round(v.h);

      if (isMobile()) {
        const controls = $('sideControls');
        const controlsW = Math.ceil(controls.getBoundingClientRect().width || 78);
        const horizontalGap = 8;
        const horizontalPadding = 16;
        const verticalPadding = 16;
        const availableW = Math.max(180, v.w - controlsW - horizontalGap - horizontalPadding);
        const availableH = Math.max(360, v.h - verticalPadding);
        blockSize = Math.floor(Math.min(availableW / COLS, availableH / ROWS));
        blockSize = clamp(blockSize, 18, 34);
      } else {
        blockSize = 30;
      }

      const w = COLS * blockSize;
      const h = ROWS * blockSize;
      setCanvasSize(canvas, ctx, w, h);
      setCanvasSize(fxCanvas, fxCtx, w, h);
      $('boardShell').style.width = w + 'px';
      $('boardShell').style.height = h + 'px';
      initBgDots();
    }

    function setCanvasSize(c, context, cssW, cssH) {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      c.style.width = cssW + 'px';
      c.style.height = cssH + 'px';
      c.width = Math.round(cssW * dpr);
      c.height = Math.round(cssH * dpr);
      context.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }

    function bindUI() {
      $('startBtn').addEventListener('click', startGame);
      $('howBtn').addEventListener('click', () => {
        $('mainMenu').classList.add('hidden');
        $('howMenu').classList.remove('hidden');
      });
      $('backHowBtn').addEventListener('click', () => {
        $('howMenu').classList.add('hidden');
        $('mainMenu').classList.remove('hidden');
      });
      $('resumeBtn').addEventListener('click', resumeGame);
      $('quitBtn').addEventListener('click', showMenu);
      $('restartBtn').addEventListener('click', startGame);
      $('homeBtn').addEventListener('click', showMenu);
      $('pauseBtn').addEventListener('click', togglePause);
      $('menuBtn').addEventListener('click', showMenu);
      $('desktopPauseBtn').addEventListener('click', togglePause);
      $('desktopMenuBtn').addEventListener('click', showMenu);
    }

    function bindKeyboard() {
      document.addEventListener('keydown', e => {
        if (!running || gameOver || !currentPiece) return;
        if (e.key === 'p' || e.key === 'P') { togglePause(); return; }
        if (paused) return;
        if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
        if (e.key === 'ArrowLeft') move(-1);
        if (e.key === 'ArrowRight') move(1);
        if (e.key === 'ArrowDown') softDrop();
        if (e.key === 'ArrowUp') rotate();
        if (e.key === ' ') hardDrop();
      });
    }

    function bindControls() {
      bindHold('leftBtn', () => move(-1), true);
      bindHold('rightBtn', () => move(1), true);
      bindHold('downBtn', softDrop, true, 70);
      bindHold('rotateBtn', rotate, false);
      bindHold('dropBtn', hardDrop, false);
    }

    function bindHold(id, action, repeat, interval = 95) {
      const btn = $(id);
      let timer = null;
      let delayTimer = null;
      const start = e => {
        e.preventDefault();
        if (!running || paused || gameOver || !currentPiece) return;
        btn.classList.add('pressed');
        action();
        if (repeat) {
          delayTimer = setTimeout(() => {
            timer = setInterval(action, interval);
          }, 170);
        }
      };
      const end = e => {
        e.preventDefault();
        btn.classList.remove('pressed');
        clearTimeout(delayTimer);
        clearInterval(timer);
        timer = null;
        delayTimer = null;
      };
      btn.addEventListener('pointerdown', start);
      btn.addEventListener('pointerup', end);
      btn.addEventListener('pointercancel', end);
      btn.addEventListener('pointerleave', end);
    }

    function startGame() {
      unlockAudio();
      $('mainMenu').classList.add('hidden');
      $('howMenu').classList.add('hidden');
      $('pauseOverlay').style.display = 'none';
      $('gameOverOverlay').style.display = 'none';
      resizeAll();
      createBoard();
      currentPiece = null;
      nextPiece = createPiece();
      score = 0;
      level = 1;
      lines = 0;
      dropInterval = 920;
      dropCounter = 0;
      lastTime = 0;
      particles = [];
      running = true;
      paused = false;
      gameOver = false;
      spawnPiece();
      updateDisplay();
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(loop);
    }

    function showMenu() {
      running = false;
      paused = false;
      cancelAnimationFrame(rafId);
      $('pauseOverlay').style.display = 'none';
      $('gameOverOverlay').style.display = 'none';
      $('mainMenu').classList.remove('hidden');
    }

    function togglePause() {
      if (!running || gameOver) return;
      paused = !paused;
      $('pauseOverlay').style.display = paused ? 'flex' : 'none';
    }

    function resumeGame() {
      if (!running || gameOver) return;
      paused = false;
      $('pauseOverlay').style.display = 'none';
    }

    function createBoard() {
      board = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    }

    function createPiece() {
      const names = Object.keys(SHAPES);
      const name = names[Math.floor(Math.random() * names.length)];
      return {
        name,
        shape: SHAPES[name].map(r => [...r]),
        color: COLORS[name],
        x: Math.floor(COLS / 2) - Math.ceil(SHAPES[name][0].length / 2),
        y: 0
      };
    }

    function spawnPiece() {
      currentPiece = nextPiece || createPiece();
      nextPiece = createPiece();
      if (!valid(currentPiece, 0, 0)) endGame();
      drawNext();
    }

    function valid(piece, ox, oy) {
      if (!piece) return false;
      for (let r = 0; r < piece.shape.length; r++) {
        for (let c = 0; c < piece.shape[r].length; c++) {
          if (!piece.shape[r][c]) continue;
          const x = piece.x + c + ox;
          const y = piece.y + r + oy;
          if (x < 0 || x >= COLS || y >= ROWS) return false;
          if (y >= 0 && board[y][x]) return false;
        }
      }
      return true;
    }

    function move(dx) {
      if (!canControl()) return;
      if (valid(currentPiece, dx, 0)) {
        currentPiece.x += dx;
        beep('move');
        draw();
      }
    }

    function softDrop() {
      if (!canControl()) return;
      if (valid(currentPiece, 0, 1)) {
        currentPiece.y++;
        score += 1;
      } else {
        lockPiece();
      }
      updateDisplay();
      draw();
    }

    function hardDrop() {
      if (!canControl()) return;
      let moved = 0;
      while (valid(currentPiece, 0, 1)) {
        currentPiece.y++;
        moved++;
      }
      score += moved * 2;
      flashDrop();
      lockPiece();
      updateDisplay();
      draw();
    }

    function rotate() {
      if (!canControl()) return;
      const original = currentPiece.shape.map(row => [...row]);
      currentPiece.shape = rotateMatrix(currentPiece.shape);
      const kicks = [0, -1, 1, -2, 2];
      let ok = false;
      for (const k of kicks) {
        if (valid(currentPiece, k, 0)) {
          currentPiece.x += k;
          ok = true;
          break;
        }
      }
      if (!ok) currentPiece.shape = original;
      else beep('rotate');
      draw();
    }

    function rotateMatrix(m) {
      const rows = m.length;
      const cols = m[0].length;
      const out = [];
      for (let c = 0; c < cols; c++) {
        out[c] = [];
        for (let r = rows - 1; r >= 0; r--) out[c][rows - 1 - r] = m[r][c];
      }
      return out;
    }

    function canControl() {
      return running && !paused && !gameOver && currentPiece;
    }

    function lockPiece() {
      if (!currentPiece) return;
      for (let r = 0; r < currentPiece.shape.length; r++) {
        for (let c = 0; c < currentPiece.shape[r].length; c++) {
          if (!currentPiece.shape[r][c]) continue;
          const x = currentPiece.x + c;
          const y = currentPiece.y + r;
          if (y < 0) return endGame();
          board[y][x] = currentPiece.color;
          addParticles((x + .5) * blockSize, (y + .5) * blockSize, currentPiece.color, 3);
        }
      }
      beep('drop');
      clearLines();
      spawnPiece();
    }

    function clearLines() {
      let cleared = 0;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (board[r].every(Boolean)) {
          for (let c = 0; c < COLS; c++) addParticles((c + .5) * blockSize, (r + .5) * blockSize, board[r][c], 5);
          board.splice(r, 1);
          board.unshift(Array(COLS).fill(null));
          cleared++;
          r++;
        }
      }
      if (!cleared) return;
      const pts = [0, 40, 100, 300, 1200];
      score += pts[cleared] * level;
      lines += cleared;
      const newLevel = Math.floor(lines / 10) + 1;
      if (newLevel > level) {
        level = newLevel;
        dropInterval = Math.max(90, 920 - (level - 1) * 70);
        showToast('升级 Lv.' + level);
      } else if (cleared >= 4) {
        showToast('TETRIS!');
      } else if (cleared >= 2) {
        showToast(cleared === 3 ? 'TRIPLE!' : 'DOUBLE!');
      }
      beep(cleared >= 4 ? 'tetris' : 'clear');
      updateDisplay();
    }

    function endGame() {
      gameOver = true;
      running = false;
      cancelAnimationFrame(rafId);
      $('finalScore').textContent = '得分 ' + score + ' ｜ 消行 ' + lines;
      $('gameOverOverlay').style.display = 'flex';
      beep('gameover');
    }

    function loop(time = 0) {
      if (!running) return;
      const delta = time - lastTime;
      lastTime = time;
      if (!paused && !gameOver) {
        dropCounter += delta;
        if (dropCounter > dropInterval) {
          if (valid(currentPiece, 0, 1)) currentPiece.y++;
          else lockPiece();
          dropCounter = 0;
        }
        draw();
      }
      animateFx();
      rafId = requestAnimationFrame(loop);
    }

    function drawEmptyBoard() {
      createBoard();
      draw();
    }

    function draw() {
      if (!ctx) return;
      const w = COLS * blockSize;
      const h = ROWS * blockSize;
      ctx.clearRect(0, 0, w, h);
      const grd = ctx.createLinearGradient(0, 0, 0, h);
      grd.addColorStop(0, '#191932');
      grd.addColorStop(1, '#10172d');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, w, h);

      ctx.strokeStyle = 'rgba(255,255,255,.075)';
      ctx.lineWidth = 1;
      for (let r = 1; r < ROWS; r++) line(0, r * blockSize, w, r * blockSize);
      for (let c = 1; c < COLS; c++) line(c * blockSize, 0, c * blockSize, h);

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) if (board[r][c]) drawBlock(c, r, board[r][c]);
      }

      if (currentPiece && !gameOver) {
        drawGhost();
        drawPiece(currentPiece);
      }
    }

    function line(x1,y1,x2,y2) {
      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.lineTo(x2,y2);
      ctx.stroke();
    }

    function drawBlock(x, y, color, alpha = 1) {
      const p = Math.max(1, Math.floor(blockSize * .08));
      const px = x * blockSize;
      const py = y * blockSize;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.fillRect(px + p, py + p, blockSize - 2*p, blockSize - 2*p);
      ctx.fillStyle = 'rgba(255,255,255,.35)';
      ctx.fillRect(px + p, py + p, blockSize - 2*p, Math.max(2, blockSize * .16));
      ctx.fillRect(px + p, py + p, Math.max(2, blockSize * .16), blockSize - 2*p);
      ctx.fillStyle = 'rgba(0,0,0,.22)';
      ctx.fillRect(px + p, py + blockSize - p - Math.max(2, blockSize * .16), blockSize - 2*p, Math.max(2, blockSize * .16));
      ctx.restore();
    }

    function drawPiece(piece) {
      piece.shape.forEach((row, r) => row.forEach((v, c) => {
        if (v) drawBlock(piece.x + c, piece.y + r, piece.color);
      }));
    }

    function drawGhost() {
      let gy = currentPiece.y;
      while (valid(currentPiece, 0, gy - currentPiece.y + 1)) gy++;
      ctx.save();
      ctx.strokeStyle = currentPiece.color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = .45;
      ctx.setLineDash([4,4]);
      currentPiece.shape.forEach((row, r) => row.forEach((v, c) => {
        if (!v) return;
        ctx.strokeRect((currentPiece.x + c) * blockSize + 3, (gy + r) * blockSize + 3, blockSize - 6, blockSize - 6);
      }));
      ctx.restore();
    }

    function drawNext() {
      if (!nextCtx || !nextPiece) return;
      nextCtx.clearRect(0,0,120,90);
      nextCtx.fillStyle = 'rgba(0,0,0,.35)';
      nextCtx.fillRect(0,0,120,90);
      const s = 18;
      const ox = (120 - nextPiece.shape[0].length * s) / 2;
      const oy = (90 - nextPiece.shape.length * s) / 2;
      nextPiece.shape.forEach((row,r) => row.forEach((v,c) => {
        if (!v) return;
        nextCtx.fillStyle = nextPiece.color;
        nextCtx.fillRect(ox + c*s + 1, oy + r*s + 1, s - 2, s - 2);
      }));
    }

    function updateDisplay() {
      $('scoreDisplay').textContent = score;
      $('levelDisplay').textContent = level;
      $('linesDisplay').textContent = lines;
      $('miniScore').textContent = score;
    }

    function addParticles(x,y,color,count) {
      for (let i=0;i<count;i++) particles.push({
        x,y,color,
        vx:(Math.random()-.5)*5,
        vy:(Math.random()-.7)*5,
        life:1,
        size:Math.random()*3+2
      });
    }

    function animateFx() {
      if (!fxCtx) return;
      const w = COLS * blockSize;
      const h = ROWS * blockSize;
      fxCtx.clearRect(0,0,w,h);
      for (let i=particles.length-1;i>=0;i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += .16;
        p.life -= .035;
        if (p.life <= 0) { particles.splice(i,1); continue; }
        fxCtx.save();
        fxCtx.globalAlpha = p.life;
        fxCtx.fillStyle = p.color;
        fxCtx.beginPath();
        fxCtx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
        fxCtx.fill();
        fxCtx.restore();
      }
    }

    function flashDrop() {
      if (!currentPiece) return;
      currentPiece.shape.forEach((row,r) => row.forEach((v,c) => {
        if (v) addParticles((currentPiece.x+c+.5)*blockSize, (currentPiece.y+r+.5)*blockSize, currentPiece.color, 5);
      }));
    }

    function initBgDots() {
      const v = getViewport();
      bgDots = [];
      const count = Math.max(18, Math.floor(v.w * v.h / 18000));
      for (let i=0;i<count;i++) bgDots.push({
        x: Math.random()*v.w,
        y: Math.random()*v.h,
        r: Math.random()*2.5+1,
        vx: (Math.random()-.5)*.25,
        vy: -Math.random()*.45-.08,
        a: Math.random()*.5+.15
      });
    }

    function animateBg() {
      const v = getViewport();
      const g = bgCtx.createLinearGradient(0,0,v.w,v.h);
      g.addColorStop(0,'#14142f');
      g.addColorStop(.55,'#302b63');
      g.addColorStop(1,'#111225');
      bgCtx.fillStyle = g;
      bgCtx.fillRect(0,0,v.w,v.h);
      bgDots.forEach(d => {
        d.x += d.vx;
        d.y += d.vy;
        if (d.y < -10) { d.y = v.h + 10; d.x = Math.random()*v.w; }
        if (d.x < -10) d.x = v.w + 10;
        if (d.x > v.w + 10) d.x = -10;
        bgCtx.fillStyle = `rgba(255,255,255,${d.a})`;
        bgCtx.beginPath();
        bgCtx.arc(d.x,d.y,d.r,0,Math.PI*2);
        bgCtx.fill();
      });
      requestAnimationFrame(animateBg);
    }

    function showToast(text) {
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = text;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    }

    function unlockAudio() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      } catch (e) {}
    }

    function beep(type) {
      try {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const map = { move: 260, rotate: 560, drop: 160, clear: 820, tetris: 1050, gameover: 180 };
        osc.frequency.value = map[type] || 360;
        gain.gain.value = type === 'move' ? .035 : .08;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + (type === 'gameover' ? .35 : .08));
        osc.stop(audioCtx.currentTime + (type === 'gameover' ? .35 : .08));
      } catch (e) {}
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
