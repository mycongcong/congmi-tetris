<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聪米方块 优化版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 10px;
            z-index: 1;
        }

        .game-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 600px) {
            .game-container {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }
        }

        .main-board {
            position: relative;
        }

        #gameCanvas {
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
        }

        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            border-radius: 10px;
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 160px;
        }

        @media (max-width: 600px) {
            .info-panel {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
            .info-panel .info-box {
                flex: 1;
                min-width: 80px;
            }
        }

        .info-box {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 12px;
            text-align: center;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .info-box.level-up {
            animation: levelUpAnim 0.5s ease;
        }

        @keyframes levelUpAnim {
            0%, 100% { transform: scale(1); background: rgba(255, 255, 255, 0.2); }
            50% { transform: scale(1.15); background: rgba(255, 215, 0, 0.5); }
        }

        .info-box h3 {
            font-size: 13px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .info-box .value {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        #nextCanvas {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }

        .touch-controls {
            display: none;
            gap: 8px;
            margin-top: 10px;
            width: 100%;
            max-width: 400px;
        }

        @media (pointer: coarse) {
            .touch-controls {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        .touch-btn {
            width: 55px;
            height: 55px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            transition: all 0.15s ease;
            user-select: none;
        }

        .touch-btn:active {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0.95);
        }

        .touch-btn.wide {
            width: 80px;
            border-radius: 25px;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }

        .menu-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            min-width: 320px;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        @media (max-width: 600px) {
            .menu-box {
                min-width: auto;
                padding: 20px;
            }
        }

        .game-logo {
            font-size: 42px;
            font-weight: bold;
            color: #fff;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3), 0 0 30px rgba(255, 255, 255, 0.5);
            margin-bottom: 25px;
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .menu-btn {
            display: block;
            width: 100%;
            padding: 14px 25px;
            margin: 8px 0;
            font-size: 16px;
            font-family: inherit;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            min-height: 48px;
        }

        .menu-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .menu-btn.secondary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .instructions-content {
            text-align: left;
            color: white;
            font-size: 14px;
            line-height: 1.8;
        }

        .instructions-content p {
            margin: 6px 0;
        }

        .key {
            display: inline-block;
            background: rgba(255, 255, 255, 0.3);
            padding: 2px 10px;
            border-radius: 5px;
            font-weight: bold;
            margin: 0 3px;
        }

        .settings-content {
            text-align: left;
            color: white;
        }

        .setting-item {
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .toggle-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            min-height: 36px;
        }

        .toggle-btn.on {
            background: #4CAF50;
            color: white;
        }

        .toggle-btn.off {
            background: #f44336;
            color: white;
        }

        .difficulty-btn, .theme-btn {
            padding: 8px 12px;
            margin: 3px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            min-height: 36px;
        }

        .difficulty-btn.active, .theme-btn.active {
            background: #ffd700;
            color: #333;
            transform: scale(1.05);
        }

        .pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            flex-direction: column;
            gap: 20px;
        }

        .pause-text {
            font-size: 32px;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-radius: 10px;
            padding: 20px;
        }

        .game-over-text {
            font-size: 28px;
            color: #ff6b6b;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        .final-score {
            font-size: 22px;
            color: white;
            margin-bottom: 15px;
        }

        .achievement-badge {
            background: linear-gradient(135deg, #ffd700, #ffb700);
            color: #333;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            margin: 5px;
            animation: badgePop 0.5s ease;
        }

        @keyframes badgePop {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .hidden {
            display: none !important;
        }

        .combo-text {
            position: absolute;
            font-size: 36px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 215, 0, 0.5);
            animation: comboAnim 1.2s ease-out forwards;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
        }

        @keyframes comboAnim {
            0% { opacity: 1; transform: scale(1) translateY(0) translateX(-50%); }
            50% { transform: scale(1.4) translateY(-30px) translateX(-50%); }
            100% { opacity: 0; transform: scale(1.6) translateY(-60px) translateX(-50%); }
        }

        .leaderboard-list {
            text-align: left;
            color: white;
            max-height: 250px;
            overflow-y: auto;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            flex-wrap: wrap;
            gap: 5px;
        }

        .leaderboard-item:first-child {
            background: linear-gradient(90deg, #ffd700, #ffb700);
            color: #333;
        }

        .rank {
            font-weight: bold;
            width: 30px;
        }

        .player-name {
            flex: 1;
            text-align: left;
        }

        .name-input {
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            width: 100%;
            margin: 10px 0;
            font-family: inherit;
        }

        .theme-selector {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
        }

        .emoji-feedback {
            position: absolute;
            font-size: 48px;
            animation: emojiFloat 1.5s ease-out forwards;
            pointer-events: none;
            z-index: 200;
        }

        @keyframes emojiFloat {
            0% { opacity: 1; transform: scale(0.5) translateY(0); }
            20% { transform: scale(1.3) translateY(-20px); }
            100% { opacity: 0; transform: scale(1) translateY(-80px); }
        }

        .desktop-only {
            display: inline;
        }

        @media (pointer: coarse) {
            .desktop-only {
                display: none;
            }
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .action-buttons .menu-btn {
            flex: 1;
        }

        .achievement-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #333;
            padding: 15px 25px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 18px;
            z-index: 2000;
            animation: toastSlide 3s ease forwards;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        @keyframes toastSlide {
            0% { transform: translateX(-50%) translateY(-100px); opacity: 0; }
            15% { transform: translateX(-50%) translateY(0); opacity: 1; }
            85% { transform: translateX(-50%) translateY(0); opacity: 1; }
            100% { transform: translateX(-50%) translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <div class="game-wrapper">
        <div class="game-container" id="gameContainer" style="display: none;">
            <div class="main-board">
                <canvas id="gameCanvas" width="300" height="600"></canvas>
                <canvas id="particleCanvas" width="300" height="600"></canvas>
                <div class="pause-overlay" id="pauseOverlay">
                    <div class="pause-text">⏸️ 游戏暂停</div>
                    <button class="menu-btn" onclick="resumeGame()">继续游戏</button>
                    <button class="menu-btn secondary" onclick="saveAndQuit()">保存并退出</button>
                </div>
                <div class="game-over-overlay" id="gameOverOverlay">
                    <div class="game-over-text">🎮 游戏结束!</div>
                    <div class="final-score" id="finalScore"></div>
                    <div id="achievementsEarned"></div>
                    <input type="text" class="name-input" id="playerName" placeholder="输入你的名字" maxlength="10">
                    <div class="action-buttons">
                        <button class="menu-btn" onclick="saveScoreAndRestart()">保存并再来一局</button>
                    </div>
                    <button class="menu-btn secondary" onclick="showMainMenu()">返回主菜单</button>
                </div>
            </div>

            <div class="info-panel">
                <div class="info-box">
                    <h3>得分</h3>
                    <div class="value" id="scoreDisplay">0</div>
                </div>
                <div class="info-box" id="levelBox">
                    <h3>等级</h3>
                    <div class="value" id="levelDisplay">1</div>
                </div>
                <div class="info-box">
                    <h3>消行</h3>
                    <div class="value" id="linesDisplay">0</div>
                </div>
                <div class="info-box">
                    <h3>下一个</h3>
                    <canvas id="nextCanvas" width="120" height="120"></canvas>
                </div>
                <button class="menu-btn" onclick="togglePause()">暂停 (P)</button>
                <button class="menu-btn secondary" onclick="showMainMenu()">返回菜单</button>
            </div>
        </div>

        <div class="touch-controls" id="touchControls">
            <button class="touch-btn" id="btnLeft">←</button>
            <button class="touch-btn" id="btnRotate">↻</button>
            <button class="touch-btn" id="btnRight">→</button>
            <button class="touch-btn wide" id="btnDown">↓ 下落</button>
            <button class="touch-btn wide" id="btnHardDrop">⬇ 硬落</button>
            <button class="touch-btn" id="btnPause">⏸</button>
        </div>
    </div>

    <div class="menu-overlay" id="mainMenu">
        <div class="menu-box">
            <div class="game-logo">聪米方块 ✨</div>
            <button class="menu-btn" onclick="startGame()">🎮 开始新游戏</button>
            <button class="menu-btn secondary" id="continueBtn" onclick="continueGame()" style="display: none;">📂 继续游戏</button>
            <button class="menu-btn" onclick="showInstructions()">📖 游戏说明</button>
            <button class="menu-btn" onclick="showSettings()">⚙️ 设置</button>
            <button class="menu-btn" onclick="showLeaderboard()">🏆 排行榜</button>
        </div>
    </div>

    <div class="menu-overlay hidden" id="instructionsMenu">
        <div class="menu-box">
            <div class="game-logo" style="font-size: 28px;">📖 游戏说明</div>
            <div class="instructions-content">
                <p><strong class="desktop-only">键盘操作:</strong></p>
                <p class="desktop-only"><span class="key">←</span> 向左移动</p>
                <p class="desktop-only"><span class="key">→</span> 向右移动</p>
                <p class="desktop-only"><span class="key">↑</span> 旋转方块</p>
                <p class="desktop-only"><span class="key">↓</span> 加速下落</p>
                <p class="desktop-only"><span class="key">空格</span> 瞬间落下</p>
                <p class="desktop-only"><span class="key">P</span> 暂停游戏</p>
                <p><strong>触屏操作:</strong></p>
                <p>使用屏幕下方的虚拟按钮控制</p>
                <br>
                <p>🎯 填满一整行即可消除得分</p>
                <p>🏆 连续消除获得更高分数!</p>
                <p>⭐ 每消除10行自动升级</p>
            </div>
            <button class="menu-btn" onclick="hideInstructions()">返回</button>
        </div>
    </div>

    <div class="menu-overlay hidden" id="settingsMenu">
        <div class="menu-box">
            <div class="game-logo" style="font-size: 28px;">⚙️ 设置</div>
            <div class="settings-content">
                <div class="setting-item">
                    <span>音效:</span>
                    <button class="toggle-btn on" id="soundToggle" onclick="toggleSound()">开启</button>
                </div>
                <div class="setting-item">
                    <span>背景音乐:</span>
                    <button class="toggle-btn on" id="musicToggle" onclick="toggleMusic()">开启</button>
                </div>
                <div class="setting-item">
                    <span>难度:</span>
                    <div>
                        <button class="difficulty-btn active" data-level="0" onclick="setDifficulty(0)">简单</button>
                        <button class="difficulty-btn" data-level="1" onclick="setDifficulty(1)">中等</button>
                        <button class="difficulty-btn" data-level="2" onclick="setDifficulty(2)">困难</button>
                    </div>
                </div>
                <div class="setting-item" style="flex-direction: column; align-items: flex-start;">
                    <span>主题选择:</span>
                    <div class="theme-selector">
                        <button class="theme-btn active" data-theme="night" onclick="setTheme('night')">🌙 夜空</button>
                        <button class="theme-btn" data-theme="ocean" onclick="setTheme('ocean')">🌊 海洋</button>
                        <button class="theme-btn" data-theme="forest" onclick="setTheme('forest')">🌲 森林</button>
                        <button class="theme-btn" data-theme="sunset" onclick="setTheme('sunset')">🌅 日落</button>
                        <button class="theme-btn" data-theme="candy" onclick="setTheme('candy')">🍬 糖果</button>
                    </div>
                </div>
                <div class="setting-item">
                    <span>落点预测:</span>
                    <button class="toggle-btn on" id="ghostToggle" onclick="toggleGhost()">显示</button>
                </div>
            </div>
            <button class="menu-btn" onclick="hideSettings()">返回</button>
        </div>
    </div>

    <div class="menu-overlay hidden" id="leaderboardMenu">
        <div class="menu-box">
            <div class="game-logo" style="font-size: 28px;">🏆 排行榜</div>
            <div class="leaderboard-list" id="leaderboardList"></div>
            <button class="menu-btn" onclick="hideLeaderboard()">返回</button>
        </div>
    </div>

    <script>
        const COLS = 10;
        const ROWS = 20;
        let BLOCK_SIZE = 30;

        const THEMES = {
            night: {
                bg: ['#0f0c29', '#302b63', '#242424'],
                particles: 'stars',
                name: '夜空'
            },
            ocean: {
                bg: ['#1a5276', '#2980b9', '#1abc9c'],
                particles: 'bubbles',
                name: '海洋'
            },
            forest: {
                bg: ['#134e5e', '#71b280', '#2d5016'],
                particles: 'leaves',
                name: '森林'
            },
            sunset: {
                bg: ['#ff512f', '#dd2476', '#f09819'],
                particles: 'sparkles',
                name: '日落'
            },
            candy: {
                bg: ['#ff9a9e', '#fecfef', '#fecfef'],
                particles: 'hearts',
                name: '糖果'
            }
        };

        const SHAPES = {
            I: [[1, 1, 1, 1]],
            O: [[1, 1], [1, 1]],
            T: [[0, 1, 0], [1, 1, 1]],
            S: [[0, 1, 1], [1, 1, 0]],
            Z: [[1, 1, 0], [0, 1, 1]],
            J: [[1, 0, 0], [1, 1, 1]],
            L: [[0, 0, 1], [1, 1, 1]]
        };

        const COLORS = {
            I: '#00f5ff',
            O: '#ffd700',
            T: '#a855f7',
            S: '#22c55e',
            Z: '#ef4444',
            J: '#3b82f6',
            L: '#f97316'
        };

        let canvas, ctx, nextCanvas, nextCtx, particleCtx, bgCanvas, bgCtx;
        let board = [];
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let level = 1;
        let lines = 0;
        let gameLoop = null;
        let isPaused = false;
        let isGameOver = false;
        let soundEnabled = true;
        let musicEnabled = true;
        let showGhost = true;
        let difficulty = 0;
        let dropSpeed = 1000;
        let currentTheme = 'night';
        let particles = [];
        let bgParticles = [];
        let musicInterval = null;
        let nextPieceAnim = 0;

        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type, intensity = 1) {
            if (!soundEnabled) return;

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            switch(type) {
                case 'rotate':
                    oscillator.frequency.value = 523 + Math.random() * 100;
                    oscillator.type = 'sine';
                    gainNode.gain.value = 0.12 * intensity;
                    oscillator.start();
                    oscillator.stop(audioContext.currentTime + 0.06);
                    break;
                case 'move':
                    oscillator.frequency.value = 280 + Math.random() * 40;
                    oscillator.type = 'sine';
                    gainNode.gain.value = 0.06 * intensity;
                    oscillator.start();
                    oscillator.stop(audioContext.currentTime + 0.025);
                    break;
                case 'drop':
                    oscillator.frequency.value = 180;
                    oscillator.type = 'triangle';
                    gainNode.gain.value = 0.18 * intensity;
                    oscillator.start();
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.12);
                    oscillator.stop(audioContext.currentTime + 0.12);
                    break;
                case 'clear':
                    oscillator.frequency.value = 784;
                    oscillator.type = 'sine';
                    gainNode.gain.value = 0.15 * intensity;
                    oscillator.start();
                    setTimeout(() => oscillator.frequency.value = 988, 40);
                    setTimeout(() => oscillator.frequency.value = 1175, 80);
                    oscillator.stop(audioContext.currentTime + 0.18);
                    break;
                case 'double':
                    oscillator.frequency.value = 659;
                    oscillator.type = 'sine';
                    gainNode.gain.value = 0.18 * intensity;
                    oscillator.start();
                    setTimeout(() => oscillator.frequency.value = 880, 100);
                    setTimeout(() => oscillator.frequency.value = 1047, 200);
                    oscillator.stop(audioContext.currentTime + 0.3);
                    break;
                case 'triple':
                    oscillator.frequency.value = 523;
                    oscillator.type = 'square';
                    gainNode.gain.value = 0.12 * intensity;
                    oscillator.start();
                    setTimeout(() => oscillator.frequency.value = 659, 80);
                    setTimeout(() => oscillator.frequency.value = 784, 160);
                    setTimeout(() => oscillator.frequency.value = 1047, 240);
                    oscillator.stop(audioContext.currentTime + 0.35);
                    break;
                case 'tetris':
                    oscillator.frequency.value = 523;
                    oscillator.type = 'sawtooth';
                    gainNode.gain.value = 0.15 * intensity;
                    oscillator.start();
                    setTimeout(() => oscillator.frequency.value = 659, 60);
                    setTimeout(() => oscillator.frequency.value = 784, 120);
                    setTimeout(() => oscillator.frequency.value = 880, 180);
                    setTimeout(() => oscillator.frequency.value = 1047, 240);
                    setTimeout(() => oscillator.frequency.value = 1319, 300);
                    oscillator.stop(audioContext.currentTime + 0.45);
                    break;
                case 'gameover':
                    oscillator.frequency.value = 392;
                    oscillator.type = 'sawtooth';
                    gainNode.gain.value = 0.12;
                    oscillator.start();
                    setTimeout(() => oscillator.frequency.value = 349, 180);
                    setTimeout(() => oscillator.frequency.value = 330, 360);
                    setTimeout(() => oscillator.frequency.value = 294, 540);
                    oscillator.stop(audioContext.currentTime + 0.7);
                    break;
                case 'levelup':
                    oscillator.frequency.value = 440;
                    oscillator.type = 'sine';
                    gainNode.gain.value = 0.2;
                    oscillator.start();
                    setTimeout(() => oscillator.frequency.value = 554, 80);
                    setTimeout(() => oscillator.frequency.value = 659, 160);
                    setTimeout(() => oscillator.frequency.value = 880, 240);
                    oscillator.stop(audioContext.currentTime + 0.4);
                    break;
            }
        }

        function playBackgroundMusic() {
            if (!musicEnabled || musicInterval) return;

            const melody = [392, 330, 330, 349, 294, 294, 262, 294, 330, 349, 392, 392, 392];
            let noteIndex = 0;

            musicInterval = setInterval(() => {
                if (!musicEnabled || isPaused || isGameOver) return;

                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.frequency.value = melody[noteIndex % melody.length];
                osc.type = 'sine';
                gain.gain.value = 0.03;
                osc.start();
                osc.stop(audioContext.currentTime + 0.15);
                noteIndex++;
            }, 250);
        }

        function stopBackgroundMusic() {
            if (musicInterval) {
                clearInterval(musicInterval);
                musicInterval = null;
            }
        }

        function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            nextCanvas = document.getElementById('nextCanvas');
            nextCtx = nextCanvas.getContext('2d');
            particleCtx = document.getElementById('particleCanvas').getContext('2d');
            bgCanvas = document.getElementById('bgCanvas');
            bgCtx = bgCanvas.getContext('2d');

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            document.addEventListener('keydown', handleKeyPress);
            setupTouchControls();
            initBgParticles();
            animateBackground();

            checkSavedGame();
            loadSettings();
            loadLeaderboard();

            requestAnimationFrame(particleAnimationLoop);
        }

        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 300);
            const maxHeight = Math.min(window.innerHeight - 280, 600);

            const scaleX = maxWidth / 300;
            const scaleY = maxHeight / 600;
            const scale = Math.min(scaleX, scaleY, 1);

            BLOCK_SIZE = Math.floor(30 * scale);

            canvas.width = COLS * BLOCK_SIZE;
            canvas.height = ROWS * BLOCK_SIZE;
            document.getElementById('particleCanvas').width = canvas.width;
            document.getElementById('particleCanvas').height = canvas.height;

            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;

            initBgParticles();
        }

        function initBgParticles() {
            bgParticles = [];
            const count = Math.floor((window.innerWidth * window.innerHeight) / 15000);

            for (let i = 0; i < count; i++) {
                bgParticles.push({
                    x: Math.random() * bgCanvas.width,
                    y: Math.random() * bgCanvas.height,
                    size: Math.random() * 4 + 1,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: Math.random() * -0.8 - 0.2,
                    opacity: Math.random() * 0.6 + 0.2,
                    type: THEMES[currentTheme].particles
                });
            }
        }

        function animateBackground() {
            const colors = THEMES[currentTheme].bg;

            const gradient = bgCtx.createLinearGradient(0, 0, bgCanvas.width, bgCanvas.height);
            gradient.addColorStop(0, colors[0]);
            gradient.addColorStop(0.5, colors[1]);
            gradient.addColorStop(1, colors[2]);
            bgCtx.fillStyle = gradient;
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

            bgParticles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;

                if (p.y < -10) {
                    p.y = bgCanvas.height + 10;
                    p.x = Math.random() * bgCanvas.width;
                }
                if (p.x < -10) p.x = bgCanvas.width + 10;
                if (p.x > bgCanvas.width + 10) p.x = -10;

                bgCtx.beginPath();
                bgCtx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;

                if (p.type === 'stars' || p.type === 'sparkles') {
                    bgCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                } else if (p.type === 'bubbles') {
                    bgCtx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
                    bgCtx.strokeStyle = `rgba(255, 255, 255, ${p.opacity * 0.5})`;
                    bgCtx.stroke();
                } else if (p.type === 'hearts') {
                    bgCtx.font = `${p.size * 4}px Arial`;
                    bgCtx.fillText('♥', p.x, p.y);
                    return;
                } else if (p.type === 'leaves') {
                    bgCtx.fillStyle = `rgba(100, 200, 100, ${p.opacity})`;
                    bgCtx.ellipse(p.x, p.y, p.size * 2, p.size, p.x * 0.01, 0, Math.PI * 2);
                }
                bgCtx.fill();
            });

            requestAnimationFrame(animateBackground);
        }

        function createParticles(x, y, color, count = 15) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8 - 2,
                    size: Math.random() * 6 + 2,
                    color: color,
                    life: 1,
                    decay: Math.random() * 0.02 + 0.02
                });
            }
        }

        function createLandParticles(y) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: y * BLOCK_SIZE + BLOCK_SIZE,
                    vx: (Math.random() - 0.5) * 4,
                    vy: -Math.random() * 3 - 1,
                    size: Math.random() * 4 + 2,
                    color: '#ffffff',
                    life: 0.8,
                    decay: 0.03
                });
            }
        }

        function particleAnimationLoop() {
            particleCtx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.15;
                p.life -= p.decay;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                particleCtx.beginPath();
                particleCtx.fillStyle = p.color;
                particleCtx.globalAlpha = p.life;
                particleCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                particleCtx.fill();
                particleCtx.globalAlpha = 1;
            }

            requestAnimationFrame(particleAnimationLoop);
        }

        function createBoard() {
            board = [];
            for (let r = 0; r < ROWS; r++) {
                board[r] = [];
                for (let c = 0; c < COLS; c++) {
                    board[r][c] = null;
                }
            }
        }

        function createPiece() {
            const shapeNames = Object.keys(SHAPES);
            const name = shapeNames[Math.floor(Math.random() * shapeNames.length)];
            return {
                name: name,
                shape: SHAPES[name].map(row => [...row]),
                color: COLORS[name],
                x: Math.floor(COLS / 2) - Math.floor(SHAPES[name][0].length / 2),
                y: 0,
                glowIntensity: 0
            };
        }

        function rotatePiece(piece) {
            const rows = piece.shape.length;
            const cols = piece.shape[0].length;
            const newShape = [];

            for (let c = 0; c < cols; c++) {
                newShape[c] = [];
                for (let r = rows - 1; r >= 0; r--) {
                    newShape[c][rows - 1 - r] = piece.shape[r][c];
                }
            }

            piece.shape = newShape;
            piece.glowIntensity = 1;
        }

        function isValidMove(piece, offsetX, offsetY) {
            for (let r = 0; r < piece.shape.length; r++) {
                for (let c = 0; c < piece.shape[r].length; c++) {
                    if (piece.shape[r][c]) {
                        const newX = piece.x + c + offsetX;
                        const newY = piece.y + r + offsetY;

                        if (newX < 0 || newX >= COLS || newY >= ROWS) {
                            return false;
                        }

                        if (newY >= 0 && board[newY][newX]) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }

        function lockPiece() {
            let lockY = 0;
            for (let r = 0; r < currentPiece.shape.length; r++) {
                for (let c = 0; c < currentPiece.shape[r].length; c++) {
                    if (currentPiece.shape[r][c]) {
                        const boardY = currentPiece.y + r;
                        const boardX = currentPiece.x + c;
                        lockY = Math.max(lockY, boardY);

                        if (boardY < 0) {
                            gameOver();
                            return;
                        }

                        board[boardY][boardX] = currentPiece.color;
                        createParticles(
                            (boardX + 0.5) * BLOCK_SIZE,
                            (boardY + 0.5) * BLOCK_SIZE,
                            currentPiece.color,
                            5
                        );
                    }
                }
            }

            createLandParticles(lockY);
            playSound('drop');
            clearLines();
            spawnPiece();
        }

        function clearLines() {
            let linesCleared = 0;
            let clearedRows = [];

            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r].every(cell => cell !== null)) {
                    clearedRows.push(r);
                    linesCleared++;
                }
            }

            if (linesCleared > 0) {
                clearedRows.forEach(r => {
                    for (let c = 0; c < COLS; c++) {
                        createParticles(
                            (c + 0.5) * BLOCK_SIZE,
                            (r + 0.5) * BLOCK_SIZE,
                            board[r][c],
                            8
                        );
                    }
                });

                clearedRows.sort((a, b) => b - a).forEach(r => {
                    board.splice(r, 1);
                    board.unshift(new Array(COLS).fill(null));
                });

                lines += linesCleared;

                const points = [0, 40, 100, 300, 1200];
                score += points[linesCleared] * level;

                if (linesCleared === 4) {
                    playSound('tetris');
                    showComboText('🔥 TETRIS! 🔥');
                    showEmojiFeedback('🏆');
                } else if (linesCleared === 3) {
                    playSound('triple');
                    showComboText('⚡ TRIPLE! ⚡');
                    showEmojiFeedback('🌟');
                } else if (linesCleared === 2) {
                    playSound('double');
                    showComboText('✨ DOUBLE! ✨');
                    showEmojiFeedback('⭐');
                } else {
                    playSound('clear');
                }

                const newLevel = Math.floor(lines / 10) + 1 + difficulty;
                if (newLevel > level) {
                    level = newLevel;
                    dropSpeed = Math.max(80, 1000 - (level - 1 - difficulty) * 70);
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, dropSpeed);

                    playSound('levelup');
                    document.getElementById('levelBox').classList.add('level-up');
                    setTimeout(() => document.getElementById('levelBox').classList.remove('level-up'), 500);

                    showAchievementToast(`🎉 升级到 Lv.${level}!`);
                }

                updateDisplay();
            }
        }

        function showEmojiFeedback(emoji) {
            const el = document.createElement('div');
            el.className = 'emoji-feedback';
            el.textContent = emoji;
            el.style.left = Math.random() * 60 + 20 + '%';
            el.style.top = '40%';
            document.querySelector('.main-board').appendChild(el);
            setTimeout(() => el.remove(), 1500);
        }

        function showAchievementToast(text) {
            const toast = document.createElement('div');
            toast.className = 'achievement-toast';
            toast.textContent = text;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showComboText(text) {
            const combo = document.createElement('div');
            combo.className = 'combo-text';
            combo.textContent = text;
            combo.style.left = '50%';
            combo.style.top = '35%';
            document.querySelector('.main-board').appendChild(combo);
            setTimeout(() => combo.remove(), 1200);
        }

        function spawnPiece() {
            currentPiece = nextPiece || createPiece();
            nextPiece = createPiece();
            nextPieceAnim = 0;

            if (!isValidMove(currentPiece, 0, 0)) {
                gameOver();
            }

            drawNextPiece();
        }

        function drawBlock(ctx, x, y, color, size = BLOCK_SIZE, glow = 0) {
            const padding = 2;

            if (glow > 0) {
                ctx.shadowColor = color;
                ctx.shadowBlur = 15 * glow;
            }

            ctx.fillStyle = color;
            ctx.fillRect(x * size + padding, y * size + padding, size - padding * 2, size - padding * 2);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.fillRect(x * size + padding, y * size + padding, size - padding * 2, 5);
            ctx.fillRect(x * size + padding, y * size + padding, 5, size - padding * 2);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.fillRect(x * size + padding + 5, y * size + padding + 5, size - padding * 2 - 10, 3);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
            ctx.fillRect(x * size + padding, y * size + size - padding - 5, size - padding * 2, 5);
            ctx.fillRect(x * size + size - padding - 5, y * size + padding, 5, size - padding * 2);

            ctx.shadowBlur = 0;
        }

        function draw() {
            ctx.fillStyle = 'rgba(26, 26, 46, 0.95)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.lineWidth = 1;
            for (let r = 0; r <= ROWS; r++) {
                ctx.beginPath();
                ctx.moveTo(0, r * BLOCK_SIZE);
                ctx.lineTo(canvas.width, r * BLOCK_SIZE);
                ctx.stroke();
            }
            for (let c = 0; c <= COLS; c++) {
                ctx.beginPath();
                ctx.moveTo(c * BLOCK_SIZE, 0);
                ctx.lineTo(c * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c]) {
                        drawBlock(ctx, c, r, board[r][c]);
                    }
                }
            }

            if (currentPiece && showGhost) {
                let ghostY = currentPiece.y;
                while (isValidMove(currentPiece, 0, ghostY - currentPiece.y + 1)) {
                    ghostY++;
                }

                ctx.globalAlpha = 0.25;
                for (let r = 0; r < currentPiece.shape.length; r++) {
                    for (let c = 0; c < currentPiece.shape[r].length; c++) {
                        if (currentPiece.shape[r][c]) {
                            const gx = currentPiece.x + c;
                            const gy = ghostY + r;

                            ctx.strokeStyle = currentPiece.color;
                            ctx.lineWidth = 2;
                            ctx.setLineDash([4, 4]);
                            ctx.strokeRect(
                                gx * BLOCK_SIZE + 2,
                                gy * BLOCK_SIZE + 2,
                                BLOCK_SIZE - 4,
                                BLOCK_SIZE - 4
                            );
                            ctx.setLineDash([]);

                            ctx.fillStyle = currentPiece.color;
                            ctx.globalAlpha = 0.1;
                            ctx.fillRect(
                                gx * BLOCK_SIZE + 2,
                                gy * BLOCK_SIZE + 2,
                                BLOCK_SIZE - 4,
                                BLOCK_SIZE - 4
                            );
                            ctx.globalAlpha = 0.25;
                        }
                    }
                }
                ctx.globalAlpha = 1;
            }

            if (currentPiece) {
                if (currentPiece.glowIntensity > 0) {
                    currentPiece.glowIntensity -= 0.05;
                }

                for (let r = 0; r < currentPiece.shape.length; r++) {
                    for (let c = 0; c < currentPiece.shape[r].length; c++) {
                        if (currentPiece.shape[r][c]) {
                            drawBlock(
                                ctx,
                                currentPiece.x + c,
                                currentPiece.y + r,
                                currentPiece.color,
                                BLOCK_SIZE,
                                currentPiece.glowIntensity
                            );
                        }
                    }
                }
            }
        }

        function drawNextPiece() {
            nextCtx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

            if (nextPiece) {
                nextPieceAnim += 0.1;
                const blockSize = 25;
                const offsetX = (nextCanvas.width - nextPiece.shape[0].length * blockSize) / 2 / blockSize;
                const offsetY = (nextCanvas.height - nextPiece.shape.length * blockSize) / 2 / blockSize;
                const scale = 0.9 + Math.sin(nextPieceAnim) * 0.05;

                nextCtx.save();
                nextCtx.translate(nextCanvas.width / 2, nextCanvas.height / 2);
                nextCtx.scale(scale, scale);
                nextCtx.translate(-nextCanvas.width / 2, -nextCanvas.height / 2);

                for (let r = 0; r < nextPiece.shape.length; r++) {
                    for (let c = 0; c < nextPiece.shape[r].length; c++) {
                        if (nextPiece.shape[r][c]) {
                            drawBlock(nextCtx, offsetX + c, offsetY + r, nextPiece.color, blockSize);
                        }
                    }
                }

                nextCtx.restore();
            }
        }

        function update() {
            if (isPaused || isGameOver) return;

            if (isValidMove(currentPiece, 0, 1)) {
                currentPiece.y++;
            } else {
                lockPiece();
            }

            draw();
            drawNextPiece();
        }

        function handleKeyPress(e) {
            if (isGameOver) return;

            if (e.key === 'p' || e.key === 'P' || e.key === 'P') {
                togglePause();
                return;
            }

            if (isPaused) return;

            switch(e.key) {
                case 'ArrowLeft':
                    if (isValidMove(currentPiece, -1, 0)) {
                        currentPiece.x--;
                        playSound('move');
                    }
                    break;
                case 'ArrowRight':
                    if (isValidMove(currentPiece, 1, 0)) {
                        currentPiece.x++;
                        playSound('move');
                    }
                    break;
                case 'ArrowDown':
                    if (isValidMove(currentPiece, 0, 1)) {
                        currentPiece.y++;
                        score += 1;
                        updateDisplay();
                        playSound('move');
                    }
                    break;
                case 'ArrowUp':
                    const originalShape = currentPiece.shape.map(row => [...row]);
                    const originalX = currentPiece.x;
                    rotatePiece(currentPiece);

                    let kicked = false;
                    const kicks = [0, -1, 1, -2, 2];
                    for (const kick of kicks) {
                        if (isValidMove(currentPiece, kick, 0)) {
                            currentPiece.x += kick;
                            kicked = true;
                            break;
                        }
                    }

                    if (!kicked) {
                        currentPiece.shape = originalShape;
                        currentPiece.x = originalX;
                    } else {
                        playSound('rotate');
                    }
                    break;
                case ' ':
                    e.preventDefault();
                    let dropDistance = 0;
                    while (isValidMove(currentPiece, 0, 1)) {
                        currentPiece.y++;
                        score += 2;
                        dropDistance++;
                    }
                    updateDisplay();
                    lockPiece();
                    break;
            }

            draw();
        }

        function setupTouchControls() {
            const controls = {
                btnLeft: () => {
                    if (!isPaused && !isGameOver && isValidMove(currentPiece, -1, 0)) {
                        currentPiece.x--;
                        playSound('move');
                        draw();
                    }
                },
                btnRight: () => {
                    if (!isPaused && !isGameOver && isValidMove(currentPiece, 1, 0)) {
                        currentPiece.x++;
                        playSound('move');
                        draw();
                    }
                },
                btnRotate: () => {
                    if (!isPaused && !isGameOver) {
                        const originalShape = currentPiece.shape.map(row => [...row]);
                        const originalX = currentPiece.x;
                        rotatePiece(currentPiece);

                        let kicked = false;
                        const kicks = [0, -1, 1, -2, 2];
                        for (const kick of kicks) {
                            if (isValidMove(currentPiece, kick, 0)) {
                                currentPiece.x += kick;
                                kicked = true;
                                break;
                            }
                        }

                        if (!kicked) {
                            currentPiece.shape = originalShape;
                            currentPiece.x = originalX;
                        } else {
                            playSound('rotate');
                        }
                        draw();
                    }
                },
                btnDown: () => {
                    if (!isPaused && !isGameOver && isValidMove(currentPiece, 0, 1)) {
                        currentPiece.y++;
                        score += 1;
                        updateDisplay();
                        playSound('move');
                        draw();
                    }
                },
                btnHardDrop: () => {
                    if (!isPaused && !isGameOver) {
                        while (isValidMove(currentPiece, 0, 1)) {
                            currentPiece.y++;
                            score += 2;
                        }
                        updateDisplay();
                        lockPiece();
                        draw();
                    }
                },
                btnPause: () => togglePause()
            };

            Object.keys(controls).forEach(id => {
                const btn = document.getElementById(id);
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    controls[id]();
                    btn.style.transform = 'scale(0.9)';
                    btn.style.background = 'rgba(255, 255, 255, 0.5)';
                });
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    btn.style.transform = '';
                    btn.style.background = '';
                });
            });
        }

        function updateDisplay() {
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('levelDisplay').textContent = level;
            document.getElementById('linesDisplay').textContent = lines;
        }

        function startGame() {
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('gameContainer').style.display = 'flex';
            document.getElementById('touchControls').style.display = '';

            createBoard();
            score = 0;
            level = 1 + difficulty;
            lines = 0;
            isPaused = false;
            isGameOver = false;
            dropSpeed = 1000 - difficulty * 200;
            particles = [];

            document.getElementById('pauseOverlay').style.display = 'none';
            document.getElementById('gameOverOverlay').style.display = 'none';

            updateDisplay();
            spawnPiece();
            draw();

            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, dropSpeed);

            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            playBackgroundMusic();
        }

        function togglePause() {
            if (isGameOver) return;

            isPaused = !isPaused;
            document.getElementById('pauseOverlay').style.display = isPaused ? 'flex' : 'none';
        }

        function resumeGame() {
            isPaused = false;
            document.getElementById('pauseOverlay').style.display = 'none';
        }

        function saveGame() {
            const gameState = {
                board: board,
                score: score,
                level: level,
                lines: lines,
                currentPiece: currentPiece,
                nextPiece: nextPiece,
                difficulty: difficulty,
                dropSpeed: dropSpeed
            };
            localStorage.setItem('congmiSavedGame', JSON.stringify(gameState));
        }

        function checkSavedGame() {
            const saved = localStorage.getItem('congmiSavedGame');
            if (saved) {
                document.getElementById('continueBtn').style.display = 'block';
            }
        }

        function continueGame() {
            const saved = localStorage.getItem('congmiSavedGame');
            if (!saved) return;

            const gameState = JSON.parse(saved);

            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('gameContainer').style.display = 'flex';
            document.getElementById('touchControls').style.display = '';

            board = gameState.board;
            score = gameState.score;
            level = gameState.level;
            lines = gameState.lines;
            currentPiece = gameState.currentPiece;
            nextPiece = gameState.nextPiece;
            difficulty = gameState.difficulty;
            dropSpeed = gameState.dropSpeed;

            isPaused = false;
            isGameOver = false;
            particles = [];

            document.getElementById('pauseOverlay').style.display = 'none';
            document.getElementById('gameOverOverlay').style.display = 'none';

            updateDisplay();
            draw();
            drawNextPiece();

            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, dropSpeed);

            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            playBackgroundMusic();
            localStorage.removeItem('congmiSavedGame');
        }

        function saveAndQuit() {
            saveGame();
            stopBackgroundMusic();
            if (gameLoop) clearInterval(gameLoop);
            showMainMenu();
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);
            stopBackgroundMusic();

            playSound('gameover');

            document.getElementById('finalScore').textContent = `最终得分: ${score}`;
            document.getElementById('gameOverOverlay').style.display = 'flex';

            const achievements = checkAchievements();
            document.getElementById('achievementsEarned').innerHTML = achievements.map(a =>
                `<span class="achievement-badge">${a}</span>`
            ).join('');
        }

        function checkAchievements() {
            const achievements = [];

            if (score >= 1000) achievements.push('🌟 千分达人');
            if (score >= 5000) achievements.push('🏆 方块大师');
            if (score >= 10000) achievements.push('👑 传奇玩家');
            if (lines >= 20) achievements.push('🔥 消除能手');
            if (lines >= 50) achievements.push('💥 消除狂人');
            if (level >= 5) achievements.push('📈 升级专家');
            if (level >= 10) achievements.push('⚡ 速度之王');

            return achievements;
        }

        function restartGame() {
            document.getElementById('gameOverOverlay').style.display = 'none';
            startGame();
        }

        function saveScoreAndRestart() {
            const name = document.getElementById('playerName').value.trim() || '匿名玩家';
            saveScore(score, name);
            restartGame();
        }

        function showMainMenu() {
            if (gameLoop) clearInterval(gameLoop);
            stopBackgroundMusic();

            document.getElementById('gameContainer').style.display = 'none';
            document.getElementById('touchControls').style.display = 'none';
            document.getElementById('mainMenu').classList.remove('hidden');
            document.getElementById('gameOverOverlay').style.display = 'none';
            document.getElementById('pauseOverlay').style.display = 'none';
            checkSavedGame();
        }

        function showInstructions() {
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('instructionsMenu').classList.remove('hidden');
        }

        function hideInstructions() {
            document.getElementById('instructionsMenu').classList.add('hidden');
            document.getElementById('mainMenu').classList.remove('hidden');
        }

        function showSettings() {
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('settingsMenu').classList.remove('hidden');
        }

        function hideSettings() {
            document.getElementById('settingsMenu').classList.add('hidden');
            document.getElementById('mainMenu').classList.remove('hidden');
            saveSettings();
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('soundToggle');
            btn.textContent = soundEnabled ? '开启' : '关闭';
            btn.className = `toggle-btn ${soundEnabled ? 'on' : 'off'}`;
        }

        function toggleMusic() {
            musicEnabled = !musicEnabled;
            const btn = document.getElementById('musicToggle');
            btn.textContent = musicEnabled ? '开启' : '关闭';
            btn.className = `toggle-btn ${musicEnabled ? 'on' : 'off'}`;

            if (!musicEnabled) {
                stopBackgroundMusic();
            } else if (!isPaused && !isGameOver && gameLoop) {
                playBackgroundMusic();
            }
        }

        function toggleGhost() {
            showGhost = !showGhost;
            const btn = document.getElementById('ghostToggle');
            btn.textContent = showGhost ? '显示' : '隐藏';
            btn.className = `toggle-btn ${showGhost ? 'on' : 'off'}`;
        }

        function setDifficulty(diff) {
            difficulty = diff;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.level) === diff);
            });
        }

        function setTheme(theme) {
            currentTheme = theme;
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.theme === theme);
            });
            bgParticles.forEach(p => p.type = THEMES[theme].particles);
        }

        function saveSettings() {
            const settings = {
                soundEnabled,
                musicEnabled,
                showGhost,
                difficulty,
                theme: currentTheme
            };
            localStorage.setItem('congmiSettings', JSON.stringify(settings));
        }

        function loadSettings() {
            const saved = localStorage.getItem('congmiSettings');
            if (saved) {
                const settings = JSON.parse(saved);
                soundEnabled = settings.soundEnabled ?? true;
                musicEnabled = settings.musicEnabled ?? true;
                showGhost = settings.showGhost ?? true;
                difficulty = settings.difficulty ?? 0;
                currentTheme = settings.theme ?? 'night';

                document.getElementById('soundToggle').textContent = soundEnabled ? '开启' : '关闭';
                document.getElementById('soundToggle').className = `toggle-btn ${soundEnabled ? 'on' : 'off'}`;

                document.getElementById('musicToggle').textContent = musicEnabled ? '开启' : '关闭';
                document.getElementById('musicToggle').className = `toggle-btn ${musicEnabled ? 'on' : 'off'}`;

                document.getElementById('ghostToggle').textContent = showGhost ? '显示' : '隐藏';
                document.getElementById('ghostToggle').className = `toggle-btn ${showGhost ? 'on' : 'off'}`;

                setDifficulty(difficulty);
                setTheme(currentTheme);
            }
        }

        function showLeaderboard() {
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('leaderboardMenu').classList.remove('hidden');
            renderLeaderboard();
        }

        function hideLeaderboard() {
            document.getElementById('leaderboardMenu').classList.add('hidden');
            document.getElementById('mainMenu').classList.remove('hidden');
        }

        function saveScore(newScore, name) {
            let scores = JSON.parse(localStorage.getItem('congmiScores') || '[]');
            scores.push({
                score: newScore,
                name: name,
                date: new Date().toLocaleDateString('zh-CN'),
                level: level,
                lines: lines
            });
            scores.sort((a, b) => b.score - a.score);
            scores = scores.slice(0, 15);
            localStorage.setItem('congmiScores', JSON.stringify(scores));
        }

        function loadLeaderboard() {
            return JSON.parse(localStorage.getItem('congmiScores') || '[]');
        }

        function renderLeaderboard() {
            const scores = loadLeaderboard();
            const list = document.getElementById('leaderboardList');

            if (scores.length === 0) {
                list.innerHTML = '<p style="text-align: center; padding: 30px; opacity: 0.7;">暂无记录，快来创造历史吧！</p>';
                return;
            }

            const medals = ['🥇', '🥈', '🥉'];

            list.innerHTML = scores.map((item, index) => `
                <div class="leaderboard-item">
                    <span class="rank">${medals[index] || `#${index + 1}`}</span>
                    <span class="player-name">${item.name}</span>
                    <span>${item.score} 分</span>
                    <span style="font-size: 11px; opacity: 0.7;">Lv.${item.level}</span>
                </div>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
